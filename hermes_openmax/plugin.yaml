name: hermes-openmax
label: OpenMax Workspace
kind: platform
version: 0.1.5
description: >
  CWS / OpenMax Workspace channel for Hermes Agent.
  Connects the agent to a coco workspace org over the cws-comm WebSocket
  and cws-core REST API, so workspace conversations become a first-class
  Hermes chat platform (alongside Lark, Telegram, ...).
author: coco-workspace
requires_env:
  - name: CWS_BFF_URL
    description: "cws-core BFF base URL (e.g. https://api.<env>.coco.xyz)"
    prompt: "CWS BFF URL"
    password: false
  - name: CWS_WS_URL
    description: "cws-comm WebSocket URL (e.g. wss://comm.<env>.coco.xyz)"
    prompt: "CWS WebSocket URL"
    password: false
  - name: CWS_API_KEY
    description: "Agent API key issued by /auth/register/agent (cwsk_...)"
    prompt: "CWS agent API key"
    password: true
optional_env:
  - name: CWS_ORG_ID
    description: "Workspace org id (empty = resolve from token/invitation)"
    prompt: "Org ID (optional)"
    password: false
  - name: CWS_ALLOWED_USERS
    description: "Comma-separated member ids allowed to talk to the agent"
    prompt: "Allowed member ids (optional)"
    password: false
  - name: CWS_ALLOW_ALL_USERS
    description: "Allow all workspace members to DM the agent (default: false)"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: CWS_HOME_CHANNEL
    description: "conversation_id for cron / notification delivery"
    prompt: "Home conversation id (optional)"
    password: false
  - name: CWS_GROUP_REQUIRE_MENTION
    description: "Require @mention in group conversations (default: true)"
    prompt: "Require mention in groups? (true/false)"
    password: false
  - name: CWS_ALLOW_AGENT_SENDERS
    description: "Let other agents' group messages trigger this agent when mentioned (default: false)"
    prompt: "Allow agent senders? (true/false)"
    password: false
  - name: CWS_ALLOW_SIBLING_DM
    description: "Allow DMs from sibling agents (default: false, prevents agent chat loops)"
    prompt: "Allow sibling agent DMs? (true/false)"
    password: false
  - name: CWS_ALLOWED_AGENT_SENDERS
    description: "Comma-separated Agent member ids allowed by the Agent loop guard; '*' allows any Agent after the remaining gates (default: empty/fail-closed)"
    prompt: "Allowed Agent member ids (optional)"
    password: false
  - name: CWS_MAX_AGENT_HOPS
    description: "Reject Agent messages whose propagated hop count exceeds this value (default: 4)"
    prompt: "Maximum Agent hops"
    password: false
  - name: CWS_AGENT_TURN_BUDGET
    description: "Maximum admitted Agent messages per sender/conversation window (default: 4)"
    prompt: "Agent turn budget"
    password: false
  - name: CWS_AGENT_TURN_WINDOW_S
    description: "Agent turn-budget window in seconds (default: 60)"
    prompt: "Agent turn window seconds"
    password: false
  - name: CWS_AGENT_DUPLICATE_WINDOW_S
    description: "Reject repeated Agent content within this many seconds (default: 60)"
    prompt: "Agent duplicate window seconds"
    password: false
  - name: CWS_DM_POLICY
    description: "Human DM admission: open | allowlist | owner (default: owner; platform can change live via agent.config)"
    prompt: "DM policy (open/allowlist/owner)"
    password: false
  - name: CWS_GROUP_POLICY
    description: "Human group admission: open | allowlist | disabled (default: allowlist; platform can change live via agent.config)"
    prompt: "Group policy (open/allowlist/disabled)"
    password: false
  - name: CWS_SELF_ALIASES
    description: "Comma-separated stable aliases accepted for plain-text @mentions (optional)"
    prompt: "Agent mention aliases (optional)"
    password: false
  - name: CWS_PERSONA
    description: "Workspace-specific persona text, appended to the per-turn orientation (base personality stays in SOUL.md)"
    prompt: "Workspace persona (optional)"
    password: false
